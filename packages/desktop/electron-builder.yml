appId: pl.planlux.hale
productName: Planlux Hale
electronVersion: "28.3.3"

directories:
  output: release
  buildResources: assets

files:
  - "dist/**/*"
  - "node_modules/**/*"
  - "package.json"

# Produkcyjna konfiguracja
asar: true
compression: maximum
artifactName: "Planlux Hale Setup ${version}.${ext}"

asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/keytar/**"

extraResources:
  - from: assets
    to: assets

publish: null

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Planlux Hale
  unicode: true
