appId: pl.planlux.hale
productName: Planlux Hale
electronVersion: "28.0.0"
directories:
  output: release
files:
  - "dist/**/*"
  - "node_modules/**/*"
  - "package.json"

# Produkcyjna konfiguracja
asar: true
compression: maximum
artifactName: "Planlux-Hale-${version}.${ext}"

# Domyślnie electron-builder kopiuje dist, assets, package.json i produkcyjne node_modules
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

publish:
  provider: github
  releaseType: release
  vPrefixedTagName: true

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Planlux Hale
  unicode: true
